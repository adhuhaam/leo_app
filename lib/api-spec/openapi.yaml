          type: string
        candidateEmergencyContact:
          type: string
        jobTitle:
          type: string
        workType:
          type: string
        basicSalary:
          type: string
        salaryPaymentDate:
          type: string
        workSite:
          type: string
        dateOfCommence:
          type: string
        jobDescription:
          type: string
