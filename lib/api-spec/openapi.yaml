openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: passports
    description: Passport OCR operations
  - name: companies
    description: Company management
  - name: loa
    description: Letter of Appointment operations
  - name: loa-options
    description: Reusable dropdown options for LOA form (work types, work sites, job titles)
  - name: clients
    description: Client / placement management (where candidates are allocated)
  - name: billing
    description: Invoices and quotations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Returns current auth status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                type: object
                required: [authenticated]
                properties:
                  authenticated:
                    type: boolean

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with the shared password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "204":
          description: Logged in
        "401":
          description: Invalid password

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out and destroy the session
      responses:
        "204":
          description: Logged out

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Update the application password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "204":
          description: Password updated
        "400":
          description: Invalid input
        "401":
          description: Current password is incorrect

  /system/settings:
    get:
      operationId: getSystemSettings
      tags: [system]
      summary: Read tenant system settings (app name, theme)
      responses:
        "200":
          description: System settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"
    patch:
      operationId: updateSystemSettings
      tags: [system]
      summary: Update tenant system settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemSettingsInput"
      responses:
        "200":
          description: Updated system settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemSettings"

  /passports:
    get:
      operationId: listPassports
      tags: [passports]
      summary: List all passport records
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: nationality
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: clientId
          in: query
          description: Filter by allocated client. Pass `none` for unallocated candidates.
          schema:
            type: string
      responses:
        "200":
          description: List of passport records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Passport"

  /passports/upload:
    post:
      operationId: uploadPassport
      tags: [passports]
      summary: Upload passport image/PDF for OCR extraction
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PassportUpload"
      responses:
        "201":
          description: Passport record created with extracted data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passport"
        "400":
          description: Invalid file

  /passports/stats:
    get:
      operationId: getPassportStats
      tags: [passports]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Passport statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassportStats"

  /passports/{id}:
    get:
      operationId: getPassport
      tags: [passports]
      summary: Get a single passport record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Passport record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passport"
        "404":
          description: Not found
    patch:
      operationId: updatePassport
      tags: [passports]
      summary: Update a passport record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassportUpdate"
      responses:
        "200":
          description: Updated passport record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passport"
        "404":
          description: Not found
    delete:
      operationId: deletePassport
      tags: [passports]
      summary: Delete a passport record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies
      parameters:
        - name: withBranding
          in: query
          description: When true, include letterheadImage and signatureImage (heavy base64 fields). Defaults to false.
          schema:
            type: boolean
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /loa:
    get:
      operationId: listLoa
      tags: [loa]
      summary: List all LOA entries
      responses:
        "200":
          description: List of LOA entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loa"
    post:
      operationId: createLoa
      tags: [loa]
      summary: Create a LOA entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoaInput"
      responses:
        "201":
          description: Created LOA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loa"

  /loa/{id}:
    get:
      operationId: getLoa
      tags: [loa]
      summary: Get a single LOA entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: LOA entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loa"
        "404":
          description: Not found
    patch:
      operationId: updateLoa
      tags: [loa]
      summary: Update a LOA entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoaUpdate"
      responses:
        "200":
          description: Updated LOA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loa"
        "404":
          description: Not found
    delete:
      operationId: deleteLoa
      tags: [loa]
      summary: Delete a LOA entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client (also unlinks any allocated candidates)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /expense-categories:
    get:
      operationId: listExpenseCategories
      tags: [expenses]
      summary: List expense categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseCategory"
    post:
      operationId: createExpenseCategory
      tags: [expenses]
      summary: Create an expense category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseCategory"
        "409":
          description: A category with this name already exists

  /expense-categories/{id}:
    patch:
      operationId: updateExpenseCategory
      tags: [expenses]
      summary: Update an expense category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseCategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseCategory"
        "404":
          description: Not found
        "409":
          description: Another category with this name already exists
    delete:
      operationId: deleteExpenseCategory
      tags: [expenses]
      summary: Delete an expense category (refused if expenses still reference it)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
        "409":
          description: Category is in use by one or more expenses

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses (newest first)
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of expenses with joined category name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Invalid input or unknown category

  /expenses/{id}:
    patch:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          description: Invalid input or unknown category
        "404":
          description: Not found
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /billing/documents:
    get:
      operationId: listBillingDocuments
      tags: [billing]
      summary: List invoices and quotations
      parameters:
        - name: kind
          in: query
          schema:
            type: string
            enum: [invoice, quotation]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of billing documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingDocumentSummary"
    post:
      operationId: createBillingDocument
      tags: [billing]
      summary: Create an invoice or quotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingDocumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingDocumentCreated"
        "400":
          description: Invalid input

  /billing/documents/{id}:
    get:
      operationId: getBillingDocument
      tags: [billing]
      summary: Get an invoice or quotation with line items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingDocument"
        "404":
          description: Not found
    patch:
      operationId: updateBillingDocument
      tags: [billing]
      summary: Update an invoice or quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingDocumentUpdate"
      responses:
        "204":
          description: Updated
        "400":
          description: Invalid input
        "404":
          description: Not found
    delete:
      operationId: deleteBillingDocument
      tags: [billing]
      summary: Delete an invoice or quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /loa-options:
    get:
      operationId: listLoaOptions
      tags: [loa-options]
      summary: List LOA dropdown options
      parameters:
        - name: category
          in: query
          description: Filter by category (work_type, work_site, job_title)
          schema:
            type: string
            enum: [work_type, work_site, job_title]
      responses:
        "200":
          description: List of options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoaOption"
    post:
      operationId: createLoaOption
      tags: [loa-options]
      summary: Add a new LOA dropdown option
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoaOptionInput"
      responses:
        "201":
          description: Created option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoaOption"
        "409":
          description: Option already exists in this category

  /loa-options/{id}:
    patch:
      operationId: updateLoaOption
      tags: [loa-options]
      summary: Rename a LOA dropdown option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLoaOptionInput"
      responses:
        "200":
          description: Updated option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoaOption"
        "404":
          description: Not found
        "409":
          description: Another option with this value already exists in this category
    delete:
      operationId: deleteLoaOption
      tags: [loa-options]
      summary: Delete a LOA dropdown option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 1

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 6
          maxLength: 200

    SystemSettings:
      type: object
      required: [appName, accentHue, hasCustomPassword]
      properties:
        appName:
          type: string
        accentHue:
          type: integer
          minimum: 0
          maximum: 360
        companyName:
          type: string
          nullable: true
        companyAddress:
          type: string
          nullable: true
        companyPhone:
          type: string
          nullable: true
        companyEmail:
          type: string
          nullable: true
        companyWebsite:
          type: string
          nullable: true
        companyRegistrationNumber:
          type: string
          nullable: true
        logoImage:
          type: string
          nullable: true
          description: Inline base64 data URL (PNG/JPEG, ≤600KB).
        hasCustomPassword:
          type: boolean
          description: True if a DB-stored password override is set; false means env APP_PASSWORD is in use.

    SystemSettingsInput:
      type: object
      properties:
        appName:
          type: string
          minLength: 1
          maxLength: 60
        accentHue:
          type: integer
          minimum: 0
          maximum: 360
        companyName:
          type: string
          nullable: true
          maxLength: 200
        companyAddress:
          type: string
          nullable: true
          maxLength: 500
        companyPhone:
          type: string
          nullable: true
          maxLength: 50
        companyEmail:
          type: string
          nullable: true
          maxLength: 200
        companyWebsite:
          type: string
          nullable: true
          maxLength: 200
        companyRegistrationNumber:
          type: string
          nullable: true
          maxLength: 100
        logoImage:
          type: string
          nullable: true

    LoaOption:
      type: object
      required: [id, category, value, createdAt]
      properties:
        id:
          type: integer
        category:
          type: string
          enum: [work_type, work_site, job_title]
        value:
          type: string
        createdAt:
          type: string

    LoaOptionInput:
      type: object
      required: [category, value]
      properties:
        category:
          type: string
          enum: [work_type, work_site, job_title]
        value:
          type: string
          minLength: 1

    UpdateLoaOptionInput:
      type: object
      required: [value]
      properties:
        value:
          type: string
          minLength: 1

    Client:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ClientInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        contactPerson:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    ExpenseCategory:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ExpenseCategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string

    ExpenseCategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: ["string", "null"]

    Expense:
      type: object
      required: [id, categoryId, categoryName, amount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        categoryName:
          type: string
        # numeric(14,2) — sent as a string to preserve precision
        amount:
          type: string
        expenseDate:
          type: ["string", "null"]
        remarks:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ExpenseInput:
      type: object
      required: [categoryId, amount]
      properties:
        categoryId:
          type: integer
        amount:
          type: string
          minLength: 1
        expenseDate:
          type: string
        remarks:
          type: string

    ExpenseUpdate:
      type: object
      properties:
        categoryId:
          type: integer
        amount:
          type: string
          minLength: 1
        expenseDate:
          type: ["string", "null"]
        remarks:
          type: ["string", "null"]

    Passport:
      type: object
      required: [id, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        fullName:
          type: ["string", "null"]
        passportNumber:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        dateOfIssue:
          type: ["string", "null"]
        dateOfExpiry:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
          description: "bangladesh or india"
        status:
