openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: passports
    description: Passport OCR operations
  - name: companies
    description: Company management
  - name: loa
    description: Letter of Appointment operations
  - name: loa-options
    description: Reusable dropdown options for LOA form (work types, work sites, job titles)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Returns current auth status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                type: object
                required: [authenticated]
                properties:
                  authenticated:
                    type: boolean

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with the shared password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "204":
          description: Logged in
        "401":
          description: Invalid password

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out and destroy the session
      responses:
        "204":
          description: Logged out

  /passports:
    get:
      operationId: listPassports
      tags: [passports]
      summary: List all passport records
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: nationality
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of passport records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Passport"

  /passports/upload:
    post:
      operationId: uploadPassport
      tags: [passports]
      summary: Upload passport image/PDF for OCR extraction
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PassportUpload"
      responses:
        "201":
          description: Passport record created with extracted data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passport"
        "400":
          description: Invalid file

  /passports/stats:
    get:
      operationId: getPassportStats
      tags: [passports]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Passport statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PassportStats"

  /passports/{id}:
    get:
      operationId: getPassport
      tags: [passports]
      summary: Get a single passport record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Passport record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passport"
        "404":
          description: Not found
    patch:
      operationId: updatePassport
      tags: [passports]
      summary: Update a passport record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassportUpdate"
      responses:
        "200":
          description: Updated passport record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passport"
        "404":
          description: Not found
    delete:
      operationId: deletePassport
      tags: [passports]
      summary: Delete a passport record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies
      parameters:
        - name: withBranding
          in: query
          description: When true, include letterheadImage and signatureImage (heavy base64 fields). Defaults to false.
          schema:
            type: boolean
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /loa:
    get:
      operationId: listLoa
      tags: [loa]
      summary: List all LOA entries
      responses:
        "200":
          description: List of LOA entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Loa"
    post:
      operationId: createLoa
      tags: [loa]
      summary: Create a LOA entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoaInput"
      responses:
        "201":
          description: Created LOA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loa"

  /loa/{id}:
    get:
      operationId: getLoa
      tags: [loa]
      summary: Get a single LOA entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: LOA entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loa"
        "404":
          description: Not found
    patch:
      operationId: updateLoa
      tags: [loa]
      summary: Update a LOA entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoaUpdate"
      responses:
        "200":
          description: Updated LOA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loa"
        "404":
          description: Not found
    delete:
      operationId: deleteLoa
      tags: [loa]
      summary: Delete a LOA entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /loa-options:
    get:
      operationId: listLoaOptions
      tags: [loa-options]
      summary: List LOA dropdown options
      parameters:
        - name: category
          in: query
          description: Filter by category (work_type, work_site, job_title)
          schema:
            type: string
            enum: [work_type, work_site, job_title]
      responses:
        "200":
          description: List of options
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoaOption"
    post:
      operationId: createLoaOption
      tags: [loa-options]
      summary: Add a new LOA dropdown option
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoaOptionInput"
      responses:
        "201":
          description: Created option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoaOption"
        "409":
          description: Option already exists in this category

  /loa-options/{id}:
    delete:
      operationId: deleteLoaOption
      tags: [loa-options]
      summary: Delete a LOA dropdown option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 1

    LoaOption:
      type: object
      required: [id, category, value, createdAt]
      properties:
        id:
          type: integer
        category:
          type: string
          enum: [work_type, work_site, job_title]
        value:
          type: string
        createdAt:
          type: string

    LoaOptionInput:
      type: object
      required: [category, value]
      properties:
        category:
          type: string
          enum: [work_type, work_site, job_title]
        value:
          type: string
          minLength: 1

    Passport:
      type: object
      required: [id, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        fullName:
          type: ["string", "null"]
        passportNumber:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        dateOfIssue:
          type: ["string", "null"]
        dateOfExpiry:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
          description: "bangladesh or india"
        status:
          type: string
          enum: [processing, completed, failed]
        errorMessage:
          type: ["string", "null"]
        originalFilename:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    PassportUpload:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary

    PassportUpdate:
      type: object
      properties:
        fullName:
          type: string
        passportNumber:
          type: string
        dateOfBirth:
          type: string
        dateOfIssue:
          type: string
        dateOfExpiry:
          type: string
        address:
          type: string
        nationality:
          type: string

    PassportStats:
      type: object
      required: [total, completed, processing, failed, bangladeshi, indian, recentUploads]
      properties:
        total:
          type: integer
        completed:
          type: integer
        processing:
          type: integer
        failed:
          type: integer
        bangladeshi:
          type: integer
        indian:
          type: integer
        recentUploads:
          type: array
          items:
            $ref: "#/components/schemas/Passport"

    Company:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        registrationNumber:
          type: ["string", "null"]
        signatoryName:
          type: ["string", "null"]
        signatoryDesignation:
          type: ["string", "null"]
        letterheadImage:
          type: ["string", "null"]
          description: Base64 data URL (image/png or image/jpeg) shown at the top of generated LOA PDFs
        signatureImage:
          type: ["string", "null"]
          description: Base64 data URL (image/png or image/jpeg) inserted on the signature line of generated LOA PDFs
        createdAt:
          type: string
        updatedAt:
          type: string

    CompanyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        address:
          type: string
        email:
          type: string
        phone:
          type: string
        country:
          type: string
        registrationNumber:
          type: string
        signatoryName:
          type: string
        signatoryDesignation:
          type: string
        letterheadImage:
          type: string
        signatureImage:
          type: string

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        email:
          type: string
        phone:
          type: string
        country:
          type: string
        registrationNumber:
          type: string
        signatoryName:
          type: string
        signatoryDesignation:
          type: string
        letterheadImage:
          type: ["string", "null"]
        signatureImage:
          type: ["string", "null"]

    Loa:
      type: object
      required: [id, createdAt, updatedAt]
      properties:
        id:
          type: integer
        companyId:
          type: ["integer", "null"]
        passportId:
          type: ["integer", "null"]
        companyName:
          type: ["string", "null"]
        companyAddress:
          type: ["string", "null"]
        companyEmail:
          type: ["string", "null"]
        companyPhone:
          type: ["string", "null"]
        companyCountry:
          type: ["string", "null"]
        companyRegistrationNumber:
          type: ["string", "null"]
        candidateName:
          type: ["string", "null"]
        candidateAddress:
          type: ["string", "null"]
        candidateNationality:
          type: ["string", "null"]
        candidateDateOfBirth:
          type: ["string", "null"]
        candidatePassportNumber:
          type: ["string", "null"]
        candidateEmergencyContact:
          type: ["string", "null"]
        jobTitle:
          type: ["string", "null"]
        workType:
          type: ["string", "null"]
        basicSalary:
          type: ["string", "null"]
        salaryPaymentDate:
          type: ["string", "null"]
        workSite:
          type: ["string", "null"]
        dateOfCommence:
          type: ["string", "null"]
        jobDescription:
          type: ["string", "null"]
        workingHours:
          type: ["string", "null"]
        workStatus:
          type: ["string", "null"]
        contractDuration:
          type: ["string", "null"]
        signatoryName:
          type: ["string", "null"]
        signatoryDesignation:
          type: ["string", "null"]
        signatureDate:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    LoaInput:
      type: object
      properties:
        companyId:
          type: integer
        passportId:
          type: integer
        companyName:
          type: string
        companyAddress:
          type: string
        companyEmail:
          type: string
        companyPhone:
          type: string
        companyCountry:
          type: string
        companyRegistrationNumber:
          type: string
        candidateName:
          type: string
        candidateAddress:
          type: string
        candidateNationality:
          type: string
        candidateDateOfBirth:
          type: string
        candidatePassportNumber:
          type: string
        candidateEmergencyContact:
          type: string
        jobTitle:
          type: string
        workType:
          type: string
        basicSalary:
          type: string
        salaryPaymentDate:
          type: string
        workSite:
          type: string
        dateOfCommence:
          type: string
        jobDescription:
          type: string
        workingHours:
          type: string
        workStatus:
          type: string
        contractDuration:
          type: string
        signatoryName:
          type: string
        signatoryDesignation:
          type: string
        signatureDate:
          type: string

    LoaUpdate:
      type: object
      properties:
        companyId:
          type: integer
        passportId:
          type: integer
        companyName:
          type: string
        companyAddress:
          type: string
        companyEmail:
          type: string
        companyPhone:
          type: string
